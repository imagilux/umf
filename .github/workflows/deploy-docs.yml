name: Deploy docs

# Releases the MkDocs site via mike on tag pushes. The tag name (with the
# leading 'v' stripped) becomes the published mike version slot, and the
# 'latest' alias is repointed to it.
#
# main is a continuous-development branch — pushes to main do NOT publish.
# Cut a tag (vX.Y or vX.Y.Z) to release.
#
# Manual escape hatch: workflow_dispatch lets you re-publish an existing
# version, backport a patch under its own alias, or publish off-schedule.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+'         # vX.Y      — minor releases
      - 'v[0-9]+.[0-9]+.[0-9]+'  # vX.Y.Z    — patch releases
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1, 0.2.1)"
        required: true
      alias:
        description: "Alias to attach (e.g. latest, dev) — leave empty for none"
        default: "latest"
        required: false

permissions:
  # mike pushes the rendered site to the gh-pages branch
  contents: write

concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # mike reads/writes the gh-pages branch history; full clone required
          fetch-depth: 0

      - name: Set up uv
        # Pinned to immutable tag — astral-sh stopped publishing floating
        # major/minor tags from v8.0.0 onward (security: tj-actions-style
        # supply-chain attacks). Bump deliberately when a new release lands.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Sync dependencies (frozen lockfile)
        run: uv sync --frozen

      - name: Configure git author for gh-pages commits
        # github-actions[bot] is the canonical identity for workflow-driven
        # commits; the noreply email matches the bot user id.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve version + alias
        id: meta
        # Tag pushes derive version from the ref (strip refs/tags/ and
        # leading 'v'); workflow_dispatch passes them in directly.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            ALIAS="${{ github.event.inputs.alias }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            ALIAS="latest"
          fi
          echo "Resolved: version=$VERSION alias=${ALIAS:-<none>}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "alias=$ALIAS"     >> "$GITHUB_OUTPUT"

      - name: Deploy with mike
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          ALIAS:   ${{ steps.meta.outputs.alias }}
        run: |
          if [ -n "$ALIAS" ]; then
            uv run mike deploy --push --update-aliases "$VERSION" "$ALIAS"
          else
            uv run mike deploy --push "$VERSION"
          fi
