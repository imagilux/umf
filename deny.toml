# cargo-deny configuration for the UMF Rust workspace.
#
# Enforces a license allowlist (permissive + weak-copyleft compatible with our
# Apache-2.0 OR MIT dual license), blocks wildcard version requirements, and
# warns on duplicate transitive crate versions so we notice when our dep graph
# fragments.
#
# Run locally with `cargo deny check` (install once via `cargo install
# --locked cargo-deny`). The same check runs in CI on every PR â€” see
# `.github/workflows/rust.yml`.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ---- License policy ----------------------------------------------------------
#
# Permissive licenses are pre-approved. MPL-2.0 is allowed â€” it's
# file-level copyleft and compatible with Apache-2.0/MIT distribution as long as
# we don't modify MPL-licensed files themselves. Strong copyleft (GPL/LGPL/AGPL)
# is *not* listed and will fail the check if pulled in transitively.

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    # Community Data License Agreement â€” Permissive 2.0. Designed for data
    # bundles like webpki-root-certs (the Mozilla CA list). Compatible with
    # Apache-2.0 distribution.
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    # Boost Software License 1.0 â€” OSI-approved, FSF-free, compatible with
    # Apache-2.0 distribution. Pulled in transitively via `xxhash-rust`
    # (squashfs ROOTFS writer via `backhand`).
    "BSL-1.0",
]
confidence-threshold = 0.93

# ---- Bans --------------------------------------------------------------------

[bans]
# Multiple semver-incompatible versions of the same crate are usually a
# transitive-dep mess. Surface them so we can decide whether to pin or unify.
multiple-versions = "warn"
# Wildcard version requirements (`foo = "*"`) defeat the lockfile's purpose.
wildcards = "deny"
# Highlight needless build-time dependencies that bloat compile times.
deny = []
skip = []
skip-tree = []

# ---- Source policy -----------------------------------------------------------

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

# ---- Security advisories -----------------------------------------------------

[advisories]
ignore = [
    # paste v1.0.15 â€” unmaintained (RUSTSEC-2024-0436). Pulled in transitively
    # via `libcontainer` â†’ `netlink-packet-core` â†’ `paste`. It's a build-time
    # macro crate (no runtime code), so unmaintained status doesn't expose us
    # to a runtime attack surface. Track upstream: replacing requires
    # netlink-packet-core/libcontainer to migrate (likely to `pastey`).
    "RUSTSEC-2024-0436",
    # protobuf v3.2.0 â€” uncontrolled-recursion stack overflow on untrusted
    # input (RUSTSEC-2024-0437). Pulled in via `libcontainer` â†’ `rust-criu`
    # â†’ `protobuf`. We don't use CRIU's checkpoint/restore code path, and
    # we never feed external protobuf data to libcontainer â€” the runtime
    # spec is JSON, generated by umf-engine itself. Reassess when
    # libcontainer publishes a release with the fix (>= 3.7.2).
    "RUSTSEC-2024-0437",
    # proc-macro-error2 v2.0.1 â€” unmaintained (RUSTSEC-2026-0173). Pulled in
    # transitively via `oci-spec` â†’ `getset` (and only there). It's a
    # build-time proc-macro crate (no runtime code), so unmaintained status
    # doesn't expose us to a runtime attack surface â€” same posture as the
    # `paste` waiver above. Reassess when `getset` / `oci-spec` migrate off it.
    "RUSTSEC-2026-0173",
]
